name: Sultan Clang Production Build (Final)

on:
  workflow_call:
    inputs:
      codename: { required: true, type: string }
      repo: { required: true, type: string }
      android_version: { required: true, type: string }
      kernel_version: { required: true, type: string }

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential curl flex g++-multilib gcc-multilib git libssl-dev libxml2 zip clang llvm lld

      - name: Clone Sources
        run: |
          git clone https://github.com/kerneltoast/android_kernel_google_tensynos kernel-src --depth 1
          git clone https://github.com/TheWildJames/AnyKernel3.git -b sultan-${{ inputs.codename }} AK3
          
          echo "🔍 Checking SUSFS branches..."
          git ls-remote --heads https://gitlab.com/simonpunk/susfs4ksu.git | grep "gki-" || true
          
          SUSFS_BRANCH="gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}"
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b "$SUSFS_BRANCH" susfs || exit 1

      - name: Setup KernelSU Next
        run: |
          cd kernel-src
          curl -LSs "https://raw.githubusercontent.com/WildKernels/Wild_KSU/stable/kernel/setup.sh" | tee ../ksu_setup.log | bash -s canary
          git diff > ../ksu_setup_diff.log || true

      - name: Adaptive Patching & Manual Injection
        run: |
          cd kernel-src
          PATCH_NAME="50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch"
          
          cp ../susfs/kernel_patches/$PATCH_NAME ./
          cp -r ../susfs/kernel_patches/fs/* ./fs/
          cp -r ../susfs/kernel_patches/include/linux/* ./include/linux/
          
          # Вырезаем конфликтный блок sys.c из патча
          sed -i '/patching file kernel\/sys.c/,/patching file/ { /patching file kernel\/sys.c/! { /patching file/! d } }' $PATCH_NAME
          
          patch -p1 < $PATCH_NAME || echo "⚠️ Patch partial failure (expected for sys.c)"
          
          # Силовое внедрение SUSFS в sys.c
          sed -i '/#include <linux\/utsname.h>/a #ifdef CONFIG_KSU_SUSFS_SPOOF_UNAME\nextern void susfs_spoof_uname(struct new_utsname* tmp);\n#endif' kernel/sys.c
          sed -i '/memcpy(&tmp, utsname(), sizeof(tmp));/a #ifdef CONFIG_KSU_SUSFS_SPOOF_UNAME\n\tsusfs_spoof_uname(&tmp);\n#endif' kernel/sys.c
          
          grep -q "susfs_spoof_uname" kernel/sys.c && echo "✅ SUSFS Injected" || (echo "❌ Injection failed" && exit 1)

      - name: Clang-proofing (Drivers & C23)
        run: |
          cd kernel-src
          find google-modules/display -name "*.c" -exec sed -i 's/struct dsim_device \* \/\* dsim \*\//struct dsim_device \*dsim/g' {} +
          find google-modules/display -name "*.c" -exec sed -i 's/struct drm_encoder \* \/\* encoder \*\//struct drm_encoder \*encoder/g' {} +
          
          MALI_COMPAT=$(find . -name "version_compat_defs.h" | grep "mali" | head -n 1)
          if [ -n "$MALI_COMPAT" ]; then
            sed -i '/static inline void vm_flags_set/,/}/d' "$MALI_COMPAT"
            sed -i '/static inline void vm_flags_clear/,/}/d' "$MALI_COMPAT"
          fi

      - name: Configure Kernel
        run: |
          cd kernel-src
          DEFCONFIG="arch/arm64/configs/${{ inputs.codename }}_defconfig"
          
          # Пишем конфиги в дефконфиг
          for CFG in CONFIG_KSU=y CONFIG_KSU_SUSFS=y CONFIG_KSU_SUSFS_SPOOF_UNAME=y CONFIG_TMPFS_XATTR=y CONFIG_TMPFS_POSIX_ACL=y; do
            echo "$CFG" >> $DEFCONFIG
          done
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 ${{ inputs.codename }}_defconfig
          ./scripts/config --file out/.config -d LTO_GCC
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig

      - name: Build Kernel
        run: |
          cd kernel-src
          # Подавляем ошибки, превращая их в ворнинги
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
               KCFLAGS="-Wno-error=unused-variable -Wno-error=unused-function -Wno-error=c23-extensions -Wno-error=array-bounds -Wno-error=deprecated-declarations" \
               -j$(nproc --all) 2>&1 | tee build.log

      - name: Post-Build Verification
        if: success()
        run: |
          echo "🔍 Verifying SUSFS presence in Image..."
          # Проверка наличия символов SUSFS в собранном ядре
          grep -i "susfs" kernel-src/build.log | head -n 20 || echo "⚠️ SUSFS logs not found in build log"

      - name: Package Result
        if: success()
        run: |
          find kernel-src/out/arch/arm64/boot -name "Image*" -exec cp {} AK3/ \;
          # Умный сбор DTB по кодовому имени
          DTB_FILES=$(find kernel-src/out -name "*${{ inputs.codename }}*.dtb")
          [ -n "$DTB_FILES" ] && cat $DTB_FILES > AK3/dtb || find kernel-src/out -name "*.dtb" -exec cat {} + > AK3/dtb
          
          cd AK3 && zip -r ../Sultan-Clang-${{ inputs.codename }}.zip ./*

      - name: Diagnostic & Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-build-${{ inputs.codename }}
          path: |
            *.zip
            kernel-src/build.log
            ksu_setup.log
            ksu_setup_diff.log
            kernel-src/out/.config
            
